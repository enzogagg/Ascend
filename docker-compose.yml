services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ascend-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ascend
      POSTGRES_PASSWORD: ascend
      POSTGRES_DB: ascend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: ascend-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  minio:
    image: minio/minio
    container_name: ascend-minio
    command: server /data --console-address ":9001"
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ascend
      MINIO_ROOT_PASSWORD: ascendpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
